---
- name: "Déploiement K8s de l'application Flask"
  hosts: localhost
  connection: local
  tasks:
    - name: "Appliquer les ressources Kubernetes (Deployment + Service)"
      kubernetes.core.k8s:
        host: https://kubernetes.default.svc
        verify_ssl: false
        state: present
        definition:
          - apiVersion: apps/v1
            kind: Deployment
            metadata:
              name: flask-app
              namespace: default
              labels:
                app: flask-app
            spec:
              replicas: 1
              selector:
                matchLabels:
                  app: flask-app
              template:
                metadata:
                  labels:
                    app: flask-app
                spec:
                  containers:
                  - name: flask-app
                    image: c0cocode/flask-app-010:v1  # My flask app
                    imagePullPolicy: Always
                    ports:
                    - containerPort: 5000

          - apiVersion: v1
            kind: Service
            metadata:
              name: flask-service
              namespace: default
            spec:
              selector:
                app: flask-app
              ports:
                - protocol: TCP
                  port: 80
                  targetPort: 5000