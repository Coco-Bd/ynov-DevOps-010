---
- name: "Déployer l'app sur K3s"
  hosts: localhost
  connection: local
  tasks:
    - name: "Créer le Deployment et le Service"
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: flask-app
            namespace: default
            labels:
              app: flask-app
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: flask-app
            template:
              metadata:
                labels:
                  app: flask-app
              spec:
                containers:
                - name: flask-app
                  image: ton-pseudo/flask-app-010:v1 # L'image que tu as pushée
                  ports:
                  - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: flask-service
  namespace: default
spec:
  selector:
    app: flask-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000